<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Network System</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0f0f0f;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Orbitron', monospace;
}

#title-bar {
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 0.25em;
  font-size: 11px;
  text-transform: uppercase;
  color: rgba(0,212,255,0.6);
}
#title-bar strong {
  color: rgba(0,212,255,1);
  font-size: 15px;
  display: block;
}

#status {
  margin-bottom: 10px;
}

.g-chip {
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(0,212,255,0.3);
  border-radius:20px;
  padding:6px 14px;
}

.g-action {
  color: rgba(0,212,255,1);
  font-size: 10px;
}

#wrapper {
  padding: 3px;
  border-radius: 6px;
  background: linear-gradient(135deg, #00d4ff44, #7c3aed44);
}

#container {
  position: relative;
  width: 640px;
  height: 480px;
  border-radius: 4px;
  overflow: hidden;
  background: #000;
}

#video {
  width: 640px;
  height: 480px;
  transform: scaleX(-1);
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  transform: scaleX(-1);
}

#hint {
  margin-top: 10px;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<div id="title-bar">
  <strong>HAND NETWORK SYSTEM</strong>
  Show both hands • Wait few seconds
</div>

<div id="status">
  <div class="g-chip">
    <span class="g-action" id="modeText">Detecting...</span>
  </div>
</div>

<div id="wrapper">
  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
</div>

<div id="hint">
  Place both hands in frame • Pattern changes automatically
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script src="app.js"></script>

</body>
</html>
