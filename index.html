<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hand Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Orbitron', 'Courier New', monospace;
    }

    #title-bar {
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.25em;
      font-size: 11px;
      text-transform: uppercase;
      color: rgba(0,212,255,0.55);
    }
    #title-bar strong {
      color: rgba(0,212,255,0.95);
      font-size: 15px;
      display: block;
      margin-bottom: 3px;
    }

    #wrapper {
      padding: 3px;
      border-radius: 6px;
      background: linear-gradient(135deg, #00d4ff44, #7c3aed44, #00d4ff22);
      box-shadow:
        0 0 50px rgba(0,212,255,0.2),
        0 0 100px rgba(0,212,255,0.08);
    }

    /* Container holds video + canvas stacked */
    #container {
      position: relative;
      width: 640px;
      height: 480px;
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 640px;
      height: 480px;
      transform: scaleX(-1); /* mirror like a selfie cam */
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1); /* mirror canvas too */
    }
    .g-chip {
      display:flex; align-items:center; gap:6px;
      background:rgba(0,0,0,0.68); border:1px solid rgba(0,212,255,0.22);
      border-radius:20px; padding:6px 14px; white-space:nowrap;
    }
    .g-emoji  { font-size:13px; line-height:1; font-family:sans-serif; }
    .g-text   { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.45); }
    .g-sep    { font-size:9px; color:rgba(255,255,255,0.2); }
    .g-action { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(0,212,255,0.9); font-weight:700; }
  </style>
</head>
<body>

  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <!-- MediaPipe libraries (load in this order) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="app.js"></script>
 
</body>
</html>
